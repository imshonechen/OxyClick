name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: OxyClick
  BIN_NAME: oxyclick
  TARGET: x86_64-pc-windows-msvc

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          $tagName = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }

          if (-not $tagName) {
            throw "Unable to resolve release tag."
          }

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: Verify tag matches Cargo.toml version
        shell: pwsh
        run: |
          $cargoVersion = (Select-String -Path Cargo.toml -Pattern '^version = "(?<version>[^"]+)"$').Matches[0].Groups['version'].Value
          $tagName = "${{ steps.meta.outputs.tag_name }}"

          if ("v$cargoVersion" -ne $tagName) {
            throw "Tag '$tagName' does not match Cargo.toml version '$cargoVersion'."
          }

      - name: Run tests
        run: cargo test --locked --target ${{ env.TARGET }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ env.TARGET }}

      - name: Package release assets
        shell: pwsh
        run: |
          $tagName = "${{ steps.meta.outputs.tag_name }}"
          $distDir = "dist"
          $exeName = "${{ env.APP_NAME }}-$tagName.exe"
          $binaryPath = "target/${{ env.TARGET }}/release/${{ env.BIN_NAME }}.exe"
          $releaseExePath = Join-Path $distDir $exeName
          $checksumPath = Join-Path $distDir "${{ env.APP_NAME }}-$tagName-sha256.txt"

          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          Copy-Item $binaryPath $releaseExePath -Force

          $hash = (Get-FileHash $releaseExePath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $checksumPath -Value "$hash  $exeName"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: OxyClick ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.meta.outputs.tag_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/OxyClick-${{ steps.meta.outputs.tag_name }}.exe
            dist/OxyClick-${{ steps.meta.outputs.tag_name }}-sha256.txt
